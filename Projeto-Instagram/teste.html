<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />

    <link rel="stylesheet" href="teste.css" />
  </head>
  <body>
    <div class="container">
      <div class="banner-container">
        <img src="../Projeto-Instagram/img/banner2.png" alt="" />
      </div>

      <div class="form-container">
        <div class="login-container">
          <img
            src="../Projeto-Instagram/img/logo_instagram.png"
            alt="Logo do Instagram"
            class="instagram"
          />
          <input
            type="email"
            placeholder="Número de telefone, usuário ou e-mail"
          />
          <input type="password" placeholder="Senha" />
          <button>Entrar</button>

          <a href="#" class="facebook"
            ><img
              src="../Projeto-Instagram/img/logo_facebook.svg"
              alt="Logo do Facebook"
              class="facebook-logo"
            />Entrar com o Facebook</a
          >

          <a href="#" class="esqueceu-senha">Esqueceu a senha?</a>
        </div>

        <div class="cadastrar-container">
          <p>
            Não tem uma conta? <a href="#" class="cadastre-se">Cadastre-se</a>
          </p>
        </div>
        <div class="download-container">
          <p>Obtenha o aplicativo.</p>
          <a href="#"
            ><img
              src="../Projeto-Instagram/img/apple_btn.png"
              alt="Logo da App Store"
              class="apple"
          /></a>
          <a href="#"
            ><img
              src="../Projeto-Instagram/img/gplay_btn.png"
              alt="Logo da Google Play Store"
              class="android"
          /></a>
        </div>
      </div>
    </div>
  </body>
</html>
