<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabuada</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>Digite o numero e confirme para gerar uma tabuada</h2>
    <form id="multiplication-form">
      <div class="form-control">
        <label for="number">tabuada do: </label>
        <input type="number" name="number" id="number" placeholder="3" />
      </div>
      <div class="form-control">
        <label for="multiplicator">multiplicar ate: </label>
        <input
          type="number"
          name="multiplicator"
          id="multiplicator"
          placeholder="3"
          value="10"
        />
      </div>
      <input type="submit" value="calcular" />
    </form>
    <div id="multiplication-table">
      <h2 id="multiplication-title">Tabuada do número <span></span></h2>
      <div id="multiplication-operations">
        <p>informe um numero para calcular uma tabuada...</p>
      </div>
    </div>
  </body>
</html>
